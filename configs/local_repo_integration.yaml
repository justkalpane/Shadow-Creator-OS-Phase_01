version: 2
mode: hybrid_github_local

repo_source_of_truth: GitHub
runtime_repo_access: github_primary_local_mirror
sync_mode: manual_command_driven

expected_windows_repo_root: C:\ShadowEmpire\Shadow-Creator-OS-Phase_01

paths:
  workflows_root: n8n/workflows
  manifests_root: n8n/manifests
  schemas_root: schemas
  rules_root: rules
  registries_root: registries
  bindings_root: bindings
  skills_root: skills

consumption_rules:
  - GitHub is the canonical source of truth
  - local repo is runtime-readable mirror
  - no automatic sync required
  - sync happens only on command

agent_behavior:
  - agent reads live GitHub
  - agent updates local mirror only when instructed

