version: 1
owner: shadow_commander
status: ACTIVE_PHASE1
constitutional_authority_ref: docs/01-architecture/provider_auth_callback_closure_law.md
purpose: >
  Canonical provider legality registry. Defines which providers exist, their
  activation status, auth style, runtime mode compatibility, and whether they
  are allowed in Phase-1.

providers:
  - provider_id: ollama_local
    display_name: Ollama (Local)
    class: local_llm
    status: active
    phase1_allowed: true
    auth_style: none
    callback_style: synchronous_local_http
    runtime_modes:
      - local
      - hybrid
    premium_provider: false
    budget_gate_required: false
    policy_gate_required: true
    notes: >
      Primary local model host for Phase-1. Current working model is
      llama3.2:3b on the active Windows target.

  - provider_id: elevenlabs_api
    display_name: ElevenLabs API
    class: cloud_provider
    status: deferred
    phase1_allowed: false
    auth_style: api_key
    callback_style: synchronous_response
    runtime_modes:
      - hybrid
      - cloud
    premium_provider: true
    budget_gate_required: true
    policy_gate_required: true
    notes: >
      Voice generation provider. Deferred in Phase-1 until release blockers on
      provider auth / quotas / approval are closed.

  - provider_id: heygen_api
    display_name: HeyGen API
    class: cloud_provider
    status: deferred
    phase1_allowed: false
    auth_style: api_key
    callback_style: polling_with_optional_webhook
    runtime_modes:
      - hybrid
      - cloud
    premium_provider: true
    budget_gate_required: true
    policy_gate_required: true
    notes: >
      Avatar generation provider. Deferred in Phase-1. Render submission and
      polling contract exists, but premium activation is blocked by release closure.

  - provider_id: youtube_data_api
    display_name: YouTube Data API
    class: cloud_provider
    status: deferred
    phase1_allowed: false
    auth_style: oauth2_authorization_code
    callback_style: redirect_uri
    runtime_modes:
      - hybrid
      - cloud
    premium_provider: false
    budget_gate_required: false
    policy_gate_required: true
    notes: >
      Publishing and analytics provider. Deferred until OAuth redirect URI and
      auth closure are finalized.
